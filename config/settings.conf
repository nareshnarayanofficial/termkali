# TermKali Configuration
TOOL_NAME="TermKali"
TOOL_VERSION="2.0"
TOOL_AUTHOR="Naresh Narayan"
TOOL_GITHUB="nareshnarayanofficial"

# Source URLs
ANLINUX_BASE="https://raw.githubusercontent.com/EXALAB/AnLinux-Resources/master/Scripts"
KALI_INSTALLER_URL="${ANLINUX_BASE}/Installer/Kali/kali.sh"
XFCE4_DE_URL="${ANLINUX_BASE}/DesktopEnvironment/Apt/Xfce4/de-apt-xfce4.sh"

# Paths
KALI_DIR="$HOME/kali-fs"
LOG_FILE="$HOME/.termkali/termkali.log"
CONFIG_DIR="$HOME/.termkali"

# Install options
REQUIRED_STORAGE_MB=1500
REQUIRED_PKGS="wget openssl-tool proot tar"
